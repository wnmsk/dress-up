name: Fuzz
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Fuzz (unauth)"
            target: "raw_unauth"
          - name: "Fuzz (auth, no structure-awareness)"
            target: "raw_auth"
          - name: "Fuzz (auth, structure-awareness)"
            target: "suit_manifest_auth"

    name: ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup (install Rust nightly, cargo-fuzz, coverage tools)
        run: |
          rustup update nightly 
          rustup default nightly
          cargo install cargo-fuzz
          rustup component add --toolchain nightly llvm-tools-preview

      - name: Compute timestamp (for naming archives)
        id: ts
        shell: bash
        run: |
          echo "stamp=$(date -u +'%Y%m%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Build fuzz target
        run: cargo fuzz build ${{ matrix.target }} 

      - name: Run fuzz target
        run: ./fuzz/run_fuzz.sh ${{ matrix.target }} -- -timeout=10 -max_total_time=3600

      - name: Create code coverage reports
        if: ${{ always() }}
        run: ./fuzz/fuzz_cov.sh ${{ matrix.target }}

      - name: Archive corpus, artifacts and results directory (metrics and cov reports)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with: 
          name: ${{ steps.ts.outputs.stamp }}_${{ matrix.target }}-export
          path: |
            fuzz/corpus/**
            fuzz/artifacts/**
            fuzz/results/**