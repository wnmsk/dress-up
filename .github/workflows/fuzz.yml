name: Fuzz
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Fuzz (unauth)"
            target: "suit_fuzz_unauth"
          - name: "Fuzz (auth, no structure-awareness)"
            target: "suit_fuzz_auth"
          - name: "Fuzz (auth, structure-awareness)"
            target: "suit_fuzz_auth_stra1"

    name: ${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup (install Rust nightly, cargo-fuzz, coverage tools)
        run: |
          rustup update nightly 
          rustup default nightly
          cargo install cargo-fuzz
          rustup component add --toolchain nightly llvm-tools-preview

      - name: Run fuzz target
        run: cargo fuzz run ${{ matrix.target }} -- -timeout=30 -max_total_time=3600

      - name: Create code coverage reports
        run: ./fuzz/fuzz_cov.sh ${{ matrix.target }}

      - name: Archive fuzzing corpus
        uses: actions/upload-artifact@v4
        with: 
          name: ${{ matrix.target }}-fuzz-corpus
          path: fuzz/corpus/*

      - name: Archive fuzzing artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: ${{ matrix.target }}-fuzz-artifacts
          path: fuzz/artifacts/*

      - name: Archive code coverage reports
        uses: actions/upload-artifact@v4
        with: 
          name: ${{ matrix.target }}-code-coverage-reports
          path: cov_reports/*